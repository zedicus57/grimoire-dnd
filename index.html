var _db = firebase.firestore();
window.fbActiveCampaignId = null;
window.fbLastWrite = 0;
window._fbDeviceId = 'dev_' + Math.random().toString(36).slice(2,8);
window._fbUnsub = null;
window.fbSync = {
  push: function(data) {
    if (!window.fbActiveCampaignId) return;
    window.fbLastWrite = Date.now();
    _db.collection('campaigns').doc(window.fbActiveCampaignId)
       .collection('sync').doc('state')
       .set(Object.assign({}, data, {_at: window.fbLastWrite, _dev: window._fbDeviceId}))
       .catch(function(e){ console.warn('[FB]', e); });
  },
  joinRoom: function(campId, onUpdate) {
    if (window._fbUnsub) window._fbUnsub();
    window.fbActiveCampaignId = campId;
    window._fbUnsub = _db.collection('campaigns').doc(campId)
      .collection('sync').doc('state')
      .onSnapshot(function(snap) {
        if (!snap.exists) return;
        var d = snap.data();
        if (!d || d._dev === window._fbDeviceId) return;
        if (d._at <= window.fbLastWrite) return;
        if (onUpdate) onUpdate(d);
      });
  }
};
console.log('[FB] Ready, device:', window._fbDeviceId);
// Poll every 2s to check if campaign was selected
setInterval(function() {
  if (window.fbActiveCampaignId && !window._fbListenerActive) {
    window._fbListenerActive = true;
    console.log('[FB] Auto-joining room:', window.fbActiveCampaignId);
    window.fbSync.joinRoom(window.fbActiveCampaignId, function(d) {
      console.log('[FB] Remote update received');
      window._fbRemoteData = d;
    });
  }
}, 1000);
